<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - David Studio</title>
<style>
body{font-family:Arial;background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c1c);background-size:400% 400%;animation:gradient 15s ease infinite;color:white;display:flex;justify-content:center;align-items:center;min-height:100vh;}
@keyframes gradient{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
.container{background: rgba(0,0,0,0.5);padding: 40px;border-radius: 20px;width: 320px;text-align:center;}
input{width:90%;padding:10px;margin:10px 0;border-radius:10px;border:none;}
button{padding: 10px 20px;border:none;border-radius:20px;cursor:pointer;background:#00f2ff;color:#000;font-weight:bold;margin-top:10px;width:95%;}
</style>
</head>
<body>

<div class="container">
<h2>David Studio - Connexion / Inscription</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Mot de passe">
<button id="registerBtn">S'inscrire</button>
<button id="loginBtn">Se connecter</button>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl = 'https://kginaltrpftesvkdcnrl.supabase.co';
const supabaseKey = 'sb_publishable_s-m0a8IlJHLIrs9SjH3BWQ_3LrBCDhD';
const supabase = createClient(supabaseUrl, supabaseKey);

async function register() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if(!email || !password){ alert("Remplis tous les champs !"); return; }

    let role = "user"; 
    if(email === "hovak.dav@gmail.com"){ role = "admin"; }

    const { error } = await supabase.from('users').insert([{ email, password, role }]);
    if(error){ alert("Erreur : " + error.message); }
    else{
        localStorage.setItem("currentUser", email);
        localStorage.setItem("currentUserRole", role);
        window.location.href = "index.html";
    }
}

async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if(!email || !password){ alert("Remplis tous les champs !"); return; }

    const { data, error } = await supabase.from('users').select('*').eq('email', email).eq('password', password).single();

    if(error || !data){ alert("Email ou mot de passe incorrect"); return; }

    localStorage.setItem("currentUser", data.email);
    localStorage.setItem("currentUserRole", data.role);
    window.location.href = "index.html";
}

document.getElementById("registerBtn").addEventListener("click", register);
document.getElementById("loginBtn").addEventListener("click", login);
</script>

</body>
</html>
